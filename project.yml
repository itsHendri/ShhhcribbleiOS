name: ShhhcribbleiOS
options:
  bundleIdPrefix: com.tiurihartog
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    branch: main

targets:
  ShhhcribbleShared:
    type: framework
    platform: iOS
    sources:
      - path: ShhhcribbleShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tiurihartog.shhhcribble.shared
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        DEFINES_MODULE: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO

  ShhhcribbleiOS:
    type: application
    platform: iOS
    sources:
      - path: ShhhcribbleiOS
        excludes:
          - Info.plist
          - ShhhcribbleiOS.entitlements
    resources:
      - ShhhcribbleiOS/Resources/Assets.xcassets
    info:
      path: ShhhcribbleiOS/Info.plist
      properties:
        CFBundleDisplayName: Shhhcribble
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundleURLTypes:
          - CFBundleURLName: com.tiurihartog.shhhcribble
            CFBundleURLSchemes:
              - shhhcribble
        LSRequiresIPhoneOS: true
        NSMicrophoneUsageDescription: "Shhhcribble records audio to transcribe your speech. Recording only happens when you trigger it."
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - armv7
          - microphone
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: ShhhcribbleiOS/ShhhcribbleiOS.entitlements
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tiurihartog.shhhcribble
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: ShhhcribbleShared
        embed: true
      - package: FluidAudio
        product: FluidAudio
      - target: ShhhcribbleWidget
        embed: true

  ShhhcribbleWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: ShhhcribbleWidget
    info:
      path: ShhhcribbleWidget/Info.plist
      properties:
        CFBundleDisplayName: Shhhcribble Widget
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tiurihartog.shhhcribble.widget
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
    dependencies:
      - target: ShhhcribbleShared
        embed: false
