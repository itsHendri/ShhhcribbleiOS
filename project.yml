name: ShhhcribbleiOS
options:
  bundleIdPrefix: com.hendrivanniekerk
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

schemes:
  ShhhcribbleiOS:
    build:
      targets:
        ShhhcribbleShared: all
        ShhhcribbleWidget: all
        ShhhcribbleiOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    branch: main

targets:
  ShhhcribbleShared:
    type: framework
    platform: iOS
    sources:
      - path: ShhhcribbleShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hendrivanniekerk.shhhcribble.shared
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: L9T3PX7HVH
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        DEFINES_MODULE: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO

  ShhhcribbleiOS:
    type: application
    platform: iOS
    sources:
      - path: ShhhcribbleiOS
        excludes:
          - Info.plist
          - ShhhcribbleiOS.entitlements
    resources:
      - ShhhcribbleiOS/Resources/Assets.xcassets
    info:
      path: ShhhcribbleiOS/Info.plist
      properties:
        CFBundleDisplayName: Shhhcribble
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundleURLTypes:
          - CFBundleURLName: com.hendrivanniekerk.shhhcribble
            CFBundleURLSchemes:
              - shhhcribble
        LSRequiresIPhoneOS: true
        NSMicrophoneUsageDescription: "Shhhcribble records audio to transcribe your speech. Recording only happens when you trigger it."
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - armv7
          - microphone
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: ShhhcribbleiOS/ShhhcribbleiOS.entitlements
      properties: {}
      # NOTE: App Group `group.com.shhhcribble` was temporarily removed so
      # the project can sign with a free Personal Team for device testing.
      # Restore before adding the keyboard extension in Sprint 5 — the
      # keyboard extension and main app share state via this group.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hendrivanniekerk.shhhcribble
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: L9T3PX7HVH
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: ShhhcribbleShared
        embed: true
      - package: FluidAudio
        product: FluidAudio
      - target: ShhhcribbleWidget
        embed: true

  ShhhcribbleWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: ShhhcribbleWidget
        excludes:
          - ShhhcribbleWidget.entitlements
      # Multi-target source membership: the widget needs StartRecordingIntent
      # for its Control Center button, and Stop/Cancel intents for the Live
      # Activity card. Apple's recommended pattern (since iOS 18) is to share
      # the intent .swift files between targets directly rather than via a
      # framework — AppShortcutsProvider in the main app only registers with
      # iOS when the referenced intents live in the main app target. Adding
      # them here too means each target compiles its own copy.
      - path: ShhhcribbleiOS/App/Intents/StartRecordingIntent.swift
      - path: ShhhcribbleiOS/App/Intents/StopRecordingIntent.swift
      - path: ShhhcribbleiOS/App/Intents/CancelRecordingIntent.swift
    info:
      path: ShhhcribbleWidget/Info.plist
      properties:
        CFBundleDisplayName: Shhhcribble Widget
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: ShhhcribbleWidget/ShhhcribbleWidget.entitlements
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hendrivanniekerk.shhhcribble.widget
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: L9T3PX7HVH
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
    dependencies:
      - target: ShhhcribbleShared
        embed: false
